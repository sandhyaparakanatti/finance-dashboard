{% extends "layout.html" %}

{% block content %}
<div class="records-view">
    <div class="card filters-card">
        <div class="card-header">
            <h3>Filter & Search</h3>
            <div class="search-box">
                <input type="text" id="record-search" placeholder="Search by description..." onkeyup="onSearchChange()">
                <i class="fas fa-search"></i>
            </div>
        </div>
        <div class="card-body">
            <div class="filter-controls">
                <div class="form-group">
                    <label>Type</label>
                    <select id="filter-type" onchange="loadRecordsData()">
                        <option value="">All Types</option>
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="filter-category" onchange="loadRecordsData()">
                        <option value="">All Categories</option>
                        <!-- Updated by JS if needed -->
                        <option value="Salary">Salary</option>
                        <option value="Freelance">Freelance</option>
                        <option value="Food">Food</option>
                        <option value="Rent">Rent</option>
                        <option value="Travel">Travel</option>
                        <option value="Bills">Bills</option>
                        <option value="Entertainment">Entertainment</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!-- Records Table -->
    <div class="card table-card full-records">
        <div class="card-header">
            <h3>Transaction History</h3>
            <div class="pagination-header" id="pagination-info">
                Page 1 of 1
            </div>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table striped hover">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Description</th>
                            <th>Category</th>
                            <th>Type</th>
                            <th>Amount</th>
                            {% if session.get('role') == 'Admin' %}
                            <th>Actions</th>
                            {% endif %}
                        </tr>
                    </thead>
                    <tbody id="records-table-body">
                        <!-- Loaded via JS -->
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card-footer">
            <div class="pagination-controls">
                <button id="prev-page" class="btn btn-sm btn-outline" disabled onclick="changePage(-1)">
                    <i class="fas fa-chevron-left"></i> Previous
                </button>
                <div class="page-numbers" id="pagination-pages"></div>
                <button id="next-page" class="btn btn-sm btn-outline" disabled onclick="changePage(1)">
                    Next <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        loadRecordsData();
    });
</script>
{% endblock %}
