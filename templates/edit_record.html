{% extends "layout.html" %}

{% block content %}
<div class="edit-record-view">
    <div class="card form-card">
        <div class="card-header">
            <h3>Update Financial Entry #{{ record.id }}</h3>
        </div>
        <div class="card-body">
            <form id="edit-record-form" onsubmit="submitUpdate(event, {{ record.id }})">
                <div class="form-group">
                    <label>Amount <span class="required">*</span></label>
                    <input type="number" id="edit-amount" name="amount" step="0.01" min="0.01" value="{{ record.amount }}" required>
                </div>
                
                <div class="form-group">
                    <label>Type <span class="required">*</span></label>
                    <select id="edit-type" name="type" required>
                        <option value="income" {{ 'selected' if record.type == 'income' else '' }}>Income</option>
                        <option value="expense" {{ 'selected' if record.type == 'expense' else '' }}>Expense</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Category <span class="required">*</span></label>
                    <select id="edit-category" name="category" required>
                        {% for cat in ['Salary', 'Freelance', 'Investment', 'Food', 'Rent', 'Travel', 'Bills', 'Entertainment'] %}
                        <option value="{{ cat }}" {{ 'selected' if record.category == cat else '' }}>{{ cat }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Date <span class="required">*</span></label>
                    <input type="date" id="edit-date" name="date" value="{{ record.date }}" required>
                </div>
                
                <div class="form-group">
                    <label>Description (Optional)</label>
                    <textarea id="edit-description" name="description" rows="3">{{ record.description }}</textarea>
                </div>
                
                <div class="form-footer">
                    <button type="submit" id="update-btn" class="btn btn-primary btn-block">Update Record</button>
                    <a href="/records" class="btn btn-secondary btn-block">Cancel</a>
                    <div id="edit-loading" class="spinner" style="display: none;"></div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
