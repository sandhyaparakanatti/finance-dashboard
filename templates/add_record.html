{% extends "layout.html" %}

{% block content %}
<div class="add-record-view">
    <div class="card form-card">
        <div class="card-header">
            <h3>Add New Financial Entry</h3>
        </div>
        <div class="card-body">
            <form id="add-record-form" onsubmit="submitForm(event)">
                <div class="form-group">
                    <label>Amount <span class="required">*</span></label>
                    <input type="number" id="form-amount" name="amount" step="0.01" min="0.01" placeholder="0.00" required>
                </div>
                
                <div class="form-group">
                    <label>Type <span class="required">*</span></label>
                    <select id="form-type" name="type" required>
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Category <span class="required">*</span></label>
                    <select id="form-category" name="category" required>
                        <option value="Salary">Salary</option>
                        <option value="Freelance">Freelance</option>
                        <option value="Investment">Investment</option>
                        <option value="Food">Food</option>
                        <option value="Rent">Rent</option>
                        <option value="Travel">Travel</option>
                        <option value="Bills">Bills</option>
                        <option value="Entertainment">Entertainment</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Date <span class="required">*</span></label>
                    <input type="date" id="form-date" name="date" required value="{{ current_date or '2024-04-05' }}">
                </div>
                
                <div class="form-group">
                    <label>Description (Optional)</label>
                    <textarea id="form-description" name="description" rows="3" placeholder="Additional details..."></textarea>
                </div>
                
                <div class="form-footer">
                    <button type="submit" id="submit-btn" class="btn btn-primary btn-block">Add Record</button>
                    <a href="/dashboard" class="btn btn-secondary btn-block">Cancel</a>
                    <div id="loading" class="spinner" style="display: none;"></div>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Set current date manually for consistency
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('form-date').value = today;
    });
</script>
{% endblock %}
